<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 130" width="320" height="130">
  <!-- Black rectangle -->
  <rect x="0" y="0" width="320" height="80" rx="4" fill="#1a1a1a"/>

  <!-- OTZMA text -->
  <text x="160" y="54" font-family="Arial, sans-serif" font-size="42" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">OTZMA</text>

  <!-- Dots (the decorative dots in the Z) -->
  <circle cx="160" cy="44" r="3" fill="#1a1a1a"/>
  <circle cx="160" cy="56" r="3" fill="#1a1a1a"/>

  <!-- Orange lines -->
  <line x1="20" y1="105" x2="100" y2="105" stroke="#F5A623" stroke-width="2.5"/>
  <line x1="220" y1="105" x2="300" y2="105" stroke="#F5A623" stroke-width="2.5"/>

  <!-- Hebrew text -->
  <text x="160" y="113" font-family="Arial, Helvetica, sans-serif" font-size="22" fill="#1a1a1a" text-anchor="middle" font-weight="400">רהיטי עוצמה</text>
</svg>
